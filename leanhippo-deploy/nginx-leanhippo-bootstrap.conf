# ============================================================
# Lean Hippo — PHASE 1 (bootstrap) Nginx config, HTTP only.
# Use this first so nginx starts before any TLS cert exists.
# After Certbot issues the certificate, switch to the hardened
# HTTPS config in nginx-leanhippo.conf.
#   sudo cp nginx-leanhippo-bootstrap.conf /etc/nginx/sites-available/leanhippo
#   sudo ln -sf /etc/nginx/sites-available/leanhippo /etc/nginx/sites-enabled/leanhippo
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
# ============================================================
server {
    listen 80;
    listen [::]:80;
    server_name leanhippo.io www.leanhippo.io;

    root  /var/www/leanhippo/out;
    index index.html;

    location /.well-known/acme-challenge/ {
        root /var/www/leanhippo/out;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    error_page 404 /404.html;
}
