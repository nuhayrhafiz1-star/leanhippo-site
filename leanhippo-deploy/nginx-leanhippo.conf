# ============================================================
# Lean Hippo Systems & Tech — Nginx server config (VPS)
# Serves the static export from /var/www/leanhippo/out.
# Install:  sudo cp nginx-leanhippo.conf /etc/nginx/sites-available/leanhippo
#           sudo ln -s /etc/nginx/sites-available/leanhippo /etc/nginx/sites-enabled/
#           sudo nginx -t && sudo systemctl reload nginx
#
# Caching uses `expires` only (no add_header) inside location blocks so the
# server-level security headers are inherited everywhere (Nginx drops parent
# add_header directives in any location that declares its own add_header).
# ============================================================

# ---- HTTP: ACME challenge + redirect everything to HTTPS ----
server {
    listen 80;
    listen [::]:80;
    server_name leanhippo.io www.leanhippo.io;

    # Let's Encrypt webroot validation
    location /.well-known/acme-challenge/ {
        root /var/www/leanhippo/out;
    }
    location / {
        return 301 https://leanhippo.io$request_uri;
    }
}

# ---- HTTPS: redirect www -> apex ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.leanhippo.io;

    ssl_certificate     /etc/letsencrypt/live/leanhippo.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/leanhippo.io/privkey.pem;

    return 301 https://leanhippo.io$request_uri;
}

# ---- HTTPS: the site ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name leanhippo.io;

    root  /var/www/leanhippo/out;
    index index.html;

    ssl_certificate     /etc/letsencrypt/live/leanhippo.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/leanhippo.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ---- Security headers (apply site-wide) ----
    add_header X-Content-Type-Options        "nosniff" always;
    add_header X-Frame-Options               "SAMEORIGIN" always;
    add_header Referrer-Policy               "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy            "camera=(), microphone=(), geolocation=(), browsing-topics=()" always;
    add_header Cross-Origin-Opener-Policy    "same-origin" always;
    add_header Strict-Transport-Security     "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self' https://api.web3forms.com; form-action 'self' https://api.web3forms.com mailto:; frame-ancestors 'self'; base-uri 'self'; object-src 'none'; upgrade-insecure-requests" always;

    # ---- Compression ----
    gzip            on;
    gzip_vary       on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied    any;
    gzip_types      text/plain text/css application/javascript application/json
                    application/xml image/svg+xml font/otf font/ttf application/manifest+json;
    # If the brotli module is available, also enable:
    # brotli on; brotli_comp_level 6;
    # brotli_types text/plain text/css application/javascript application/json image/svg+xml;

    # ---- Clean URLs from the trailingSlash static export ----
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # ---- Long cache for Next's content-hashed assets ----
    location /_next/static/ {
        expires 1y;
        access_log off;
    }

    # ---- Fonts & images ----
    location ~* \.(otf|ttf|woff2?|png|jpe?g|svg|ico)$ {
        expires 180d;
        access_log off;
    }

    # ---- Custom 404 ----
    error_page 404 /404.html;

    # ---- Block dotfiles (except ACME well-known) ----
    location ~ /\.(?!well-known) {
        deny all;
    }
}
